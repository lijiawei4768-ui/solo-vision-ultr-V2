<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- theme-color updated dynamically by the preload script below -->
    <meta name="theme-color" id="theme-color-meta" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Solo Vision Ultra</title>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ─── Tailwind CSS (Play CDN) ─────────────────────────── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {} } }
    </script>

    <!-- ─── Preload colour mode BEFORE React mounts ─────────────
         Reads saved colorMode from localStorage and sets the body
         background immediately so there is no white/black flash
         when the app reloads.
    ──────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('svultra_settings') || '{}');
          var light = s.colorMode === 'light';
          var bg    = light ? '#F2F2F7' : '#000000';
          var tc    = light ? '#F2F2F7' : '#000000';
          document.documentElement.style.background = bg;
          document.body && (document.body.style.background = bg);
          var meta = document.getElementById('theme-color-meta');
          if (meta) meta.setAttribute('content', tc);
          if (light) document.documentElement.classList.add('sv-light');
        } catch (e) {}
      })();
    </script>

    <!-- ─── Global baseline ────────────────────────────────── -->
    <style>
      /* Default to dark (OLED black) — overridden by preload script for light */
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #000000;
      }

      /* Light mode background applied before React */
      html.sv-light,
      html.sv-light body,
      html.sv-light #root {
        background: #F2F2F7;
      }

      /* Disable iOS double-tap zoom */
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* Smooth momentum scrolling on iOS */
      * {
        -webkit-overflow-scrolling: touch;
      }

      /* SF Pro system font stack */
      body {
        font-family: -apple-system, 'SF Pro Display', 'SF Pro Text',
                     'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Safe-area padding for iPhone notch / Dynamic Island */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Custom scrollbar — dark */
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.10);
        border-radius: 2px;
      }

      /* Custom scrollbar — light */
      html.sv-light ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.12);
      }

      /* Range input */
      input[type="range"] {
        -webkit-appearance: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.25);
      }

      /* Light mode: darker range thumb */
      html.sv-light input[type="range"]::-webkit-slider-thumb {
        background: #1C1C1E;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
